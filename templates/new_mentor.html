<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Mentor - Youth Entrepreneur Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">Youth Entrepreneur Hub</a>
            <a href="/dashboard" class="btn btn-outline-light">Dashboard</a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h3 class="mb-4">Add a Mentor</h3>
                <form method="POST" action="/mentors/new">
                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-control" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Area of Expertise</label>
                        <input type="text" class="form-control" name="expertise" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Bio</label>
                        <textarea class="form-control" name="bio" rows="4"></textarea>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Add Mentor</button>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
