<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - Youth Entrepreneur Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">Youth Entrepreneur Hub</a>
            <div>
                <a href="/dashboard" class="btn btn-outline-light me-2">Dashboard</a>
                <a href="/courses/new" class="btn btn-light text-success fw-bold">+ Add a Course</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h3 class="mb-4">Courses</h3>

        {% if courses %}
            <div class="row">
                {% for course in courses %}
                <div class="col-md-4 mb-4">
                    <div class="card h-100 shadow-sm">
                        <div class="card-body d-flex flex-column">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h5 class="card-title mb-0">{{ course.title }}</h5>
                                <span class="badge bg-success">{{ course.category }}</span>
                            </div>
                            <p class="card-text text-muted flex-grow-1">{{ course.description }}</p>
                            <a href="/courses/{{ course.id }}" class="btn btn-success w-100 mt-3">View Course</a>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        {% else %}
            <p class="text-muted">No courses available yet.</p>
        {% endif %}
    </div>

</body>
</html>
