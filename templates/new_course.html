<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add a Course - Youth Entrepreneur Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">Youth Entrepreneur Hub</a>
            <a href="/courses" class="btn btn-outline-light">Back to Courses</a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h3 class="mb-4">Add a New Course</h3>
                <form method="POST" action="/courses/new">
                    <div class="mb-3">
                        <label class="form-label">Course Title</label>
                        <input type="text" class="form-control" name="title" required placeholder="e.g. Finance Basics for Startups">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <select class="form-select" name="category" required>
                            <option value="" disabled selected>Select a category...</option>
                            <option value="Business Basics">Business Basics</option>
                            <option value="Financial Literacy">Financial Literacy</option>
                            <option value="Marketing">Marketing</option>
                            <option value="Technology">Technology</option>
                            <option value="Legal & Operations">Legal & Operations</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" name="description" rows="5" required placeholder="Provide a brief summary of what this course covers..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Add Course</button>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
