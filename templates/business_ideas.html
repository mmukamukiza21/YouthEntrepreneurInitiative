<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Ideas - Youth Entrepreneur Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">Youth Entrepreneur Hub</a>
            <div>
                <a href="/dashboard" class="btn btn-outline-light me-2">Dashboard</a>
                <a href="/ideas/new" class="btn btn-light text-success fw-bold">+ Post an Idea</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h3 class="mb-4">Business Ideas</h3>

        {% if ideas %}
            {% for idea in ideas %}
            <div class="card mb-3">
                <div class="card-body">
                    <h5 class="card-title">{{ idea.title }}</h5>
                    <p class="card-text">{{ idea.description }}</p>
                </div>
            </div>
            {% endfor %}
        {% else %}
            <p class="text-muted">No business ideas posted yet. Be the first!</p>
        {% endif %}
    </div>

</body>
</html>
