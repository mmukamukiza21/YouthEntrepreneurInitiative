<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentors - Youth Entrepreneur Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">Youth Entrepreneur Hub</a>
            <div>
                <a href="/dashboard" class="btn btn-outline-light me-2">Dashboard</a>
                <a href="/mentors/new" class="btn btn-light text-success fw-bold">+ Add Mentor</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h3 class="mb-4">Meet Our Mentors</h3>

        {% if mentors %}
        <div class="row g-3">
            {% for mentor in mentors %}
            <div class="col-md-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">{{ mentor.name }}</h5>
                        <span class="badge bg-light text-dark mb-2">{{ mentor.expertise }}</span>
                        <p class="card-text text-muted">{{ mentor.bio }}</p>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <p class="text-muted">No mentors added yet.</p>
        {% endif %}
    </div>

</body>
</html>
